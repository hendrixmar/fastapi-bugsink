when:
  - event: push
    branch: main

steps:
  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx:5
    settings:
      repo: pulp.artesanosdigitalescom.com.mx/fastapi-bugsink/app
      registry: pulp.artesanosdigitalescom.com.mx
      dockerfile: Dockerfile
      tags:
        - ${CI_COMMIT_SHA}
        - latest
      username:
        from_secret: pulp_user
      password:
        from_secret: pulp_password

  - name: inject-secrets-and-deploy
    image: python:3.12-alpine
    depends_on: [build-and-push]
    environment:
      DOKPLOY_API_KEY:
        from_secret: dokploy_api_key
      INFISICAL_CLIENT_ID:
        from_secret: infisical_client_id
      INFISICAL_CLIENT_SECRET:
        from_secret: infisical_client_secret
    commands:
      - python3 -c "
        import json, os, urllib.request

        INFISICAL_URL = 'http://172.17.0.1:80'
        INFISICAL_HOST = 'infisical.artesanosdigitalescom.com.mx'
        WORKSPACE_ID = '95e5961f-8e52-403c-b83b-479e5b422284'
        INFISICAL_ENV = 'dev'
        COMPOSE_ID = 'ibcDGWxAp6qyvgMCm6UrM'
        DOKPLOY_URL = 'http://172.17.0.1:3000/api'

        client_id = os.environ['INFISICAL_CLIENT_ID']
        client_secret = os.environ['INFISICAL_CLIENT_SECRET']
        dokploy_key = os.environ['DOKPLOY_API_KEY']

        print('=== Authenticating with Infisical ===')
        data = json.dumps({'clientId': client_id, 'clientSecret': client_secret}).encode()
        req = urllib.request.Request(f'{INFISICAL_URL}/api/v1/auth/universal-auth/login', data=data, method='POST')
        req.add_header('Content-Type', 'application/json')
        req.add_header('Host', INFISICAL_HOST)
        token = json.loads(urllib.request.urlopen(req, timeout=10).read())['accessToken']
        print('Token obtained')

        print('=== Fetching secrets from Infisical ===')
        req = urllib.request.Request(f'{INFISICAL_URL}/api/v3/secrets/raw?workspaceId={WORKSPACE_ID}&environment={INFISICAL_ENV}&secretPath=/')
        req.add_header('Authorization', f'Bearer {token}')
        req.add_header('Host', INFISICAL_HOST)
        secrets = json.loads(urllib.request.urlopen(req, timeout=10).read())['secrets']
        env_lines = [f\"{s['secretKey']}={s['secretValue']}\" for s in secrets]
        env_content = chr(10).join(env_lines)
        print(f'Fetched {len(env_lines)} secrets')

        print('=== Pushing secrets to Dokploy ===')
        payload = json.dumps({'composeId': COMPOSE_ID, 'env': env_content}).encode()
        req = urllib.request.Request(f'{DOKPLOY_URL}/compose.update', data=payload, method='POST')
        req.add_header('Content-Type', 'application/json')
        req.add_header('x-api-key', dokploy_key)
        urllib.request.urlopen(req, timeout=10)
        print('Secrets injected')

        print('=== Triggering deploy ===')
        payload = json.dumps({'composeId': COMPOSE_ID}).encode()
        req = urllib.request.Request(f'{DOKPLOY_URL}/compose.deploy', data=payload, method='POST')
        req.add_header('Content-Type', 'application/json')
        req.add_header('x-api-key', dokploy_key)
        urllib.request.urlopen(req, timeout=10)
        print('Deploy triggered!')
        "
