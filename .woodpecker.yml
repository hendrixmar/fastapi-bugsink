when:
  branch: main
  event: push

steps:
  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      repo: 172.17.0.1:5000/fastapi-bugsink
      registry: 172.17.0.1:5000
      tag: latest
      username:
        from_secret: registry_username
      password:
        from_secret: registry_password
      dockerfile: Dockerfile
      insecure: true

  - name: deploy
    image: curlimages/curl:latest
    commands:
      - |
        curl -sf -X POST \
          "http://172.17.0.1:3000/api/compose.deploy" \
          -H "Content-Type: application/json" \
          -H "x-api-key: $$DOKPLOY_API_KEY" \
          -d '{"composeId": "ibcDGWxAp6qyvgMCm6UrM"}'
        echo "Deploy triggered!"
    secrets:
      - dokploy_api_key
