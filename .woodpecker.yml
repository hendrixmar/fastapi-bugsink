when:
  - event: push
    branch: main

steps:
  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx:5
    settings:
      repo: pulp.artesanosdigitalescom.com.mx/fastapi-bugsink/app
      registry: pulp.artesanosdigitalescom.com.mx
      dockerfile: Dockerfile
      tags:
        - ${CI_COMMIT_SHA}
        - latest
      username:
        from_secret: pulp_user
      password:
        from_secret: pulp_password

  - name: inject-secrets-and-deploy
    image: curlimages/curl:latest
    depends_on: [build-and-push]
    environment:
      DOKPLOY_API_KEY:
        from_secret: dokploy_api_key
      INFISICAL_CLIENT_ID:
        from_secret: infisical_client_id
      INFISICAL_CLIENT_SECRET:
        from_secret: infisical_client_secret
    commands:
      - |
        INFISICAL_URL="http://172.17.0.1:8088"
        WORKSPACE_ID="95e5961f-8e52-403c-b83b-479e5b422284"
        INFISICAL_ENV="dev"
        COMPOSE_ID="ibcDGWxAp6qyvgMCm6UrM"
        DOKPLOY_URL="http://172.17.0.1:3000/api"

        echo "=== Authenticating with Infisical ==="
        TOKEN=$(curl -sf "$${INFISICAL_URL}/api/v1/auth/universal-auth/login" \
          -H "Content-Type: application/json" \
          -d "{\"clientId\":\"$${INFISICAL_CLIENT_ID}\",\"clientSecret\":\"$${INFISICAL_CLIENT_SECRET}\"}" \
          | sed -n 's/.*"accessToken":"\([^"]*\)".*/\1/p')

        if [ -z "$TOKEN" ]; then echo "Failed to get Infisical token"; exit 1; fi
        echo "Token obtained"

        echo "=== Fetching secrets from Infisical ==="
        SECRETS_JSON=$(curl -sf "$${INFISICAL_URL}/api/v3/secrets/raw?workspaceId=$WORKSPACE_ID&environment=$INFISICAL_ENV&secretPath=/" \
          -H "Authorization: Bearer $TOKEN")

        ENV_VARS=$(echo "$SECRETS_JSON" | sed -n 's/.*"secretKey":"\([^"]*\)"[^}]*"secretValue":"\([^"]*\)".*/\1=\2/p' | tr '\n' '\n')
        echo "Fetched $(echo "$ENV_VARS" | wc -l) secrets"

        echo "=== Pushing secrets to Dokploy ==="
        ESCAPED_ENV=$(printf '%s' "$ENV_VARS" | sed 's/\\/\\\\/g; s/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')

        curl -sf -X POST "$DOKPLOY_URL/compose.update" \
          -H "Content-Type: application/json" \
          -H "x-api-key: $${DOKPLOY_API_KEY}" \
          -d "{\"composeId\":\"$COMPOSE_ID\",\"env\":\"$ESCAPED_ENV\"}"
        echo "Secrets injected"

        echo "=== Triggering deploy ==="
        curl -sf -X POST "$DOKPLOY_URL/compose.deploy" \
          -H "Content-Type: application/json" \
          -H "x-api-key: $${DOKPLOY_API_KEY}" \
          -d "{\"composeId\":\"$COMPOSE_ID\"}"
        echo "Deploy triggered!"
