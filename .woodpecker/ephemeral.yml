when:
  - event: push
    branch:
      - feature/*
      - fix/*

steps:
  - name: fetch-ci-tools
    image: alpine/git
    commands:
      - git clone --depth 1 --branch v1 https://github.com/hendrixmar/ci-shared.git .ci-shared

  - name: ephemeral-lint-and-test
    image: python:3.12-slim
    commands:
      - pip install -q -r requirements.txt
      - ruff check . --exclude .ci-shared
      - pytest tests/ -v

  - name: ephemeral-dependency-audit
    image: python:3.12-slim
    commands:
      - pip install -q --upgrade pip
      - pip install -q pip-audit -r requirements.txt
      - pip-audit --strict --desc

  - name: ephemeral-dockerfile-lint
    image: hadolint/hadolint:latest-alpine
    commands:
      - hadolint Dockerfile

  - name: ephemeral-build-and-push
    image: woodpeckerci/plugin-docker-buildx:5
    depends_on: [ephemeral-lint-and-test, ephemeral-dependency-audit, ephemeral-dockerfile-lint]
    settings:
      repo: pulp.artesanosdigitalescom.com.mx/fastapi-bugsink/app
      registry: pulp.artesanosdigitalescom.com.mx
      dockerfile: Dockerfile
      tags:
        - ephemeral-${CI_COMMIT_SHA}
      build_args:
        - SERVICE_VERSION=${CI_COMMIT_SHA}
      username:
        from_secret: pulp_user
      password:
        from_secret: pulp_password

  - name: ephemeral-image-scan
    image: ghcr.io/aquasecurity/trivy:latest
    depends_on: [ephemeral-build-and-push]
    failure: ignore
    environment:
      TRIVY_USERNAME:
        from_secret: pulp_user
      TRIVY_PASSWORD:
        from_secret: pulp_password
    commands:
      - trivy image
          --severity CRITICAL
          --ignore-unfixed
          --exit-code 0
          --no-progress
          --scanners vuln,secret
          pulp.artesanosdigitalescom.com.mx/fastapi-bugsink/app:ephemeral-${CI_COMMIT_SHA}

  - name: ephemeral-deploy
    image: python:3.12-alpine
    depends_on: [fetch-ci-tools, ephemeral-build-and-push]
    environment:
      OPENBAO_ROLE_ID:
        from_secret: openbao_role_id
      OPENBAO_SECRET_ID:
        from_secret: openbao_secret_id
      DOKPLOY_API_KEY:
        from_secret: dokploy_api_key
      PROJECT_NAME: fastapi-bugsink
      DOKPLOY_ENVIRONMENT_ID:
        from_secret: dokploy_environment_id
    commands:
      - python3 .ci-shared/ephemeral.py create --branch ${CI_COMMIT_BRANCH} --image pulp.artesanosdigitalescom.com.mx/fastapi-bugsink/app:ephemeral-${CI_COMMIT_SHA}
