when:
  - event: pull_request_closed

steps:
  - name: fetch-ci-tools
    image: alpine/git
    commands:
      - git clone --depth 1 --branch v1 https://github.com/hendrixmar/ci-shared.git .ci-shared

  - name: ephemeral-destroy
    image: python:3.12-alpine
    depends_on: [fetch-ci-tools]
    environment:
      DOKPLOY_API_KEY:
        from_secret: dokploy_api_key
      PROJECT_NAME: fastapi-bugsink
    commands:
      - python3 .ci-shared/ephemeral.py destroy --branch ${CI_COMMIT_SOURCE_BRANCH}
