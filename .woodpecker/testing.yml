when:
  - event: push
    branch: testing

steps:
  - name: testing-lint-and-test
    image: python:3.12-slim
    commands:
      - pip install -q -r requirements.txt
      - ruff check .
      - pytest tests/ -v

  - name: testing-dependency-audit
    image: python:3.12-slim
    commands:
      - pip install -q pip-audit -r requirements.txt
      - pip-audit --strict --desc

  - name: testing-build-and-push
    image: woodpeckerci/plugin-docker-buildx:5
    depends_on: [testing-lint-and-test, testing-dependency-audit]
    settings:
      repo: pulp.artesanosdigitalescom.com.mx/fastapi-bugsink/app
      registry: pulp.artesanosdigitalescom.com.mx
      dockerfile: Dockerfile
      tags:
        - testing-${CI_COMMIT_SHA}
        - testing
      build_args:
        - SERVICE_VERSION=${CI_COMMIT_SHA}
      username:
        from_secret: pulp_user
      password:
        from_secret: pulp_password

  - name: testing-image-scan
    image: aquasec/trivy:latest
    depends_on: [testing-build-and-push]
    commands:
      - trivy image --severity HIGH,CRITICAL --exit-code 0 --no-progress pulp.artesanosdigitalescom.com.mx/fastapi-bugsink/app:testing-${CI_COMMIT_SHA}

  - name: testing-inject-secrets-and-deploy
    image: python:3.12-alpine
    depends_on: [testing-image-scan]
    environment:
      DOKPLOY_API_KEY:
        from_secret: dokploy_api_key
      INFISICAL_CLIENT_ID:
        from_secret: infisical_client_id
      INFISICAL_CLIENT_SECRET:
        from_secret: infisical_client_secret
      COMPOSE_ID: SD0CDzsv2o_x3gI8PfHTY
      INFISICAL_ENVIRONMENT: dev
    commands:
      - python3 ci/inject_secrets_and_deploy.py
