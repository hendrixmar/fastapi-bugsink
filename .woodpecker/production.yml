when:
  - event: push
    branch: main

steps:
  - name: fetch-ci-tools
    image: alpine/git
    commands:
      - git clone --depth 1 --branch v1 https://github.com/hendrixmar/ci-shared.git .ci-shared

  - name: production-lint-and-test
    image: python:3.12-slim
    commands:
      - pip install -q -r requirements.txt
      - ruff check . --exclude .ci-shared
      - pytest tests/ -v

  - name: production-dependency-audit
    image: python:3.12-slim
    commands:
      - pip install -q --upgrade pip
      - pip install -q pip-audit -r requirements.txt
      - pip-audit --strict --desc

  - name: production-build-and-push
    image: woodpeckerci/plugin-docker-buildx:5
    depends_on: [production-lint-and-test, production-dependency-audit]
    settings:
      repo: pulp.artesanosdigitalescom.com.mx/fastapi-bugsink/app
      registry: pulp.artesanosdigitalescom.com.mx
      dockerfile: Dockerfile
      tags:
        - production-${CI_COMMIT_SHA}
        - latest
      build_args:
        - SERVICE_VERSION=${CI_COMMIT_SHA}
      username:
        from_secret: pulp_user
      password:
        from_secret: pulp_password

  - name: production-inject-secrets-and-deploy
    image: python:3.12-alpine
    depends_on: [fetch-ci-tools, production-build-and-push]
    environment:
      OPENBAO_ROLE_ID:
        from_secret: openbao_role_id
      OPENBAO_SECRET_ID:
        from_secret: openbao_secret_id
      DOKPLOY_API_KEY:
        from_secret: dokploy_api_key
      COMPOSE_ID: ibcDGWxAp6qyvgMCm6UrM
      PROJECT_NAME: fastapi-bugsink
      OPENBAO_ENV: prod
    commands:
      - python3 .ci-shared/openbao_deploy.py
